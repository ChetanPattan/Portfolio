<body>
    <div id="app">
        <div class="boot-screen">
            <div class="boot-card">
                <p class="boot-mono">GET /portfolio</p>
                <div class="boot-bar"><span></span></div>
                <p class="boot-mono">status: <em>loading…</em></p>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script>
        // Other half of the GitHub Pages SPA redirect trick (see 404.html):
        // turns the mangled query string back into a real path before Blazor's
        // router reads the URL. Harmless no-op on any other host.
        (function (l) {
            if (l.search[1] === '/') {
                var decoded = l.search.slice(1).split('&').map(function (s) {
                    return s.replace(/~and~/g, '&');
                }).join('?');
                window.history.replaceState(null, null,
                    l.pathname.slice(0, -1) + decoded + l.hash
                );
            }
        }(window.location));
    </script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
